# Variant per produzione: build delle immagini, niente bind-mount, env via secret.
# Usare con: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  postgres:
    ports: []  # non esposto pubblicamente in produzione

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: a4u-backend:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENV: production
      LOG_FORMAT: json
      COOKIE_SECURE: "true"
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_FULL_NAME: ${BOOTSTRAP_ADMIN_FULL_NAME:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      # Limiti upload (default backend: 5 MB / 10 MB audio).
      UPLOAD_MAX_MB: ${UPLOAD_MAX_MB:-5}
      AVATAR_AUDIO_MAX_MB: ${AVATAR_AUDIO_MAX_MB:-10}
      # MiniMax (generazione clip video avatar). Vuoto = disabilita.
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_BASE_URL: ${MINIMAX_BASE_URL:-https://api.minimax.io}
      MINIMAX_VIDEO_MODEL: ${MINIMAX_VIDEO_MODEL:-MiniMax-Hailuo-02}
      MINIMAX_CLIP_DURATION: ${MINIMAX_CLIP_DURATION:-6}
      MINIMAX_CLIP_RESOLUTION: ${MINIMAX_CLIP_RESOLUTION:-1080P}
      MINIMAX_POLL_INTERVAL_SECONDS: ${MINIMAX_POLL_INTERVAL_SECONDS:-10}
      # RunPod Serverless — TTS XTTS-v2 su GPU per la generazione video
      # (Fase 6 §9). Vuoto = generazione video disabilitata. Il worker
      # gira nella cartella `XTTS/` del repo (immagine Docker dedicata).
      RUNPOD_API_KEY: ${RUNPOD_API_KEY:-}
      RUNPOD_TTS_ENDPOINT_ID: ${RUNPOD_TTS_ENDPOINT_ID:-}
      RUNPOD_BASE_URL: ${RUNPOD_BASE_URL:-https://api.runpod.ai}
      RUNPOD_TTS_TIMEOUT_SECONDS: ${RUNPOD_TTS_TIMEOUT_SECONDS:-1800}
      RUNPOD_TTS_POLL_INTERVAL_SECONDS: ${RUNPOD_TTS_POLL_INTERVAL_SECONDS:-3}
      # RunPod Serverless — MuseTalk lip-sync per il "Video con Avatar"
      # (Fase 6b §9b). Stesso account del TTS (RUNPOD_API_KEY riusato),
      # endpoint dedicato. R2 (Cloudflare, S3-compatible) = storage di
      # transito. Vuoti = "Video con Avatar" disabilitato.
      RUNPOD_MUSETALK_ENDPOINT_ID: ${RUNPOD_MUSETALK_ENDPOINT_ID:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      AVATAR_VIDEO_OVERLAY_SCALE: ${AVATAR_VIDEO_OVERLAY_SCALE:-0.24}
      AVATAR_VIDEO_OVERLAY_MARGIN: ${AVATAR_VIDEO_OVERLAY_MARGIN:-24}
      # OpenAI (traduzione i18n + summarization + generazione corso AI).
      # Ogni fase del pipeline corso usa un modello configurabile a parte:
      # _model: name del modello, _max_tokens: budget di output.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TRANSLATE_BATCH_SIZE: ${OPENAI_TRANSLATE_BATCH_SIZE:-40}
      OPENAI_SUMMARIZE_MODEL: ${OPENAI_SUMMARIZE_MODEL:-gpt-4o-mini}
      OPENAI_SUMMARIZE_MAX_TOKENS: ${OPENAI_SUMMARIZE_MAX_TOKENS:-8000}
      # Glossario corso (§10.1). Output compatto, max_tokens basso ok.
      OPENAI_GLOSSARY_MODEL: ${OPENAI_GLOSSARY_MODEL:-gpt-5.5}
      OPENAI_GLOSSARY_MAX_TOKENS: ${OPENAI_GLOSSARY_MAX_TOKENS:-4000}
      # Architettura corso (moduli + lezioni). Default gpt-5.5: se hai
      # accesso a un modello reasoning più potente, va bene; altrimenti
      # passa a gpt-4o (8000 tokens normalmente bastano per un'architettura
      # corso a 5-10 lezioni; sali a 16000 se vedi `finish_reason=length`).
      OPENAI_MODULES_LESSONS_MODEL: ${OPENAI_MODULES_LESSONS_MODEL:-gpt-5.5}
      OPENAI_ARCHITECTURE_MAX_TOKENS: ${OPENAI_ARCHITECTURE_MAX_TOKENS:-8000}
      OPENAI_ARCHITECTURE_REASONING_EFFORT: ${OPENAI_ARCHITECTURE_REASONING_EFFORT:-medium}
      OPENAI_LESSON_STRUCTURE_MODEL: ${OPENAI_LESSON_STRUCTURE_MODEL:-gpt-5.5}
      OPENAI_LESSON_STRUCTURE_MAX_TOKENS: ${OPENAI_LESSON_STRUCTURE_MAX_TOKENS:-16000}
      OPENAI_LESSON_STRUCTURE_REASONING_EFFORT: ${OPENAI_LESSON_STRUCTURE_REASONING_EFFORT:-medium}
      OPENAI_LESSON_CONTENT_MODEL: ${OPENAI_LESSON_CONTENT_MODEL:-gpt-5.5}
      OPENAI_LESSON_CONTENT_MAX_TOKENS: ${OPENAI_LESSON_CONTENT_MAX_TOKENS:-32000}
      OPENAI_LESSON_CONTENT_REASONING_EFFORT: ${OPENAI_LESSON_CONTENT_REASONING_EFFORT:-high}
      # Slide lezione (Fase 4). Riusa asset Fase 3 + ne genera di nuovi.
      OPENAI_LESSON_SLIDES_MODEL: ${OPENAI_LESSON_SLIDES_MODEL:-gpt-5.5}
      OPENAI_LESSON_SLIDES_MAX_TOKENS: ${OPENAI_LESSON_SLIDES_MAX_TOKENS:-16000}
      OPENAI_LESSON_SLIDES_REASONING_EFFORT: ${OPENAI_LESSON_SLIDES_REASONING_EFFORT:-medium}
      # Discorso temporizzato (Fase 5). Output prosa TTS-safe, ±5%
      # sulla durata target (130 wpm IT / 150 wpm EN).
      OPENAI_LESSON_SPEECH_MODEL: ${OPENAI_LESSON_SPEECH_MODEL:-gpt-5.5}
      OPENAI_LESSON_SPEECH_MAX_TOKENS: ${OPENAI_LESSON_SPEECH_MAX_TOKENS:-16000}
      OPENAI_LESSON_SPEECH_REASONING_EFFORT: ${OPENAI_LESSON_SPEECH_REASONING_EFFORT:-medium}
      # Parallelismo dei worker batch AI (per pipeline corso). Alza per
      # corsi grandi / API key OpenAI tier 2+ (più TPM disponibili).
      # Caveat: troppe richieste parallele possono triggerare 429 rate
      # limit di OpenAI (auto-retry trasparente le riprende, ma rallenta).
      COURSE_LESSON_STRUCTURE_MAX_CONCURRENCY: ${COURSE_LESSON_STRUCTURE_MAX_CONCURRENCY:-5}
      COURSE_LESSON_CONTENT_MAX_CONCURRENCY: ${COURSE_LESSON_CONTENT_MAX_CONCURRENCY:-3}
      COURSE_LESSON_SLIDES_MAX_CONCURRENCY: ${COURSE_LESSON_SLIDES_MAX_CONCURRENCY:-3}
      COURSE_LESSON_SPEECH_MAX_CONCURRENCY: ${COURSE_LESSON_SPEECH_MAX_CONCURRENCY:-3}
      COURSE_LESSON_PDF_MAX_CONCURRENCY: ${COURSE_LESSON_PDF_MAX_CONCURRENCY:-2}
      # Polling interval del worker (secondi). Più basso = pickup più
      # rapido ma più query inutili al DB.
      COURSE_LESSON_STRUCTURE_POLL_INTERVAL_SECONDS: ${COURSE_LESSON_STRUCTURE_POLL_INTERVAL_SECONDS:-4}
      COURSE_LESSON_CONTENT_POLL_INTERVAL_SECONDS: ${COURSE_LESSON_CONTENT_POLL_INTERVAL_SECONDS:-4}
      COURSE_LESSON_SLIDES_POLL_INTERVAL_SECONDS: ${COURSE_LESSON_SLIDES_POLL_INTERVAL_SECONDS:-4}
      COURSE_LESSON_SPEECH_POLL_INTERVAL_SECONDS: ${COURSE_LESSON_SPEECH_POLL_INTERVAL_SECONDS:-4}
      COURSE_LESSON_PDF_POLL_INTERVAL_SECONDS: ${COURSE_LESSON_PDF_POLL_INTERVAL_SECONDS:-4}
      # Auto-retry trasparente prima del fail terminale (default 5).
      COURSE_LESSON_STRUCTURE_AUTO_RETRY_MAX: ${COURSE_LESSON_STRUCTURE_AUTO_RETRY_MAX:-5}
      COURSE_LESSON_CONTENT_AUTO_RETRY_MAX: ${COURSE_LESSON_CONTENT_AUTO_RETRY_MAX:-5}
      COURSE_LESSON_SLIDES_AUTO_RETRY_MAX: ${COURSE_LESSON_SLIDES_AUTO_RETRY_MAX:-5}
      COURSE_LESSON_SPEECH_AUTO_RETRY_MAX: ${COURSE_LESSON_SPEECH_AUTO_RETRY_MAX:-5}
      COURSE_LESSON_PDF_AUTO_RETRY_MAX: ${COURSE_LESSON_PDF_AUTO_RETRY_MAX:-5}
      # Threading torch/numpy/scientific Python (XTTS, librosa). Su VM
      # senza AVX/AVX2 (CPU QEMU emulate, ecc.) il default può partire
      # con thread=1 → preprocessing audio molto lento. Settare a nproc.
      # Override esempio in `.env`: OMP_NUM_THREADS=4
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-2}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-2}
      OPENBLAS_NUM_THREADS: ${OPENBLAS_NUM_THREADS:-2}
      # Rate limiting login
      RATE_LIMIT_LOGIN_PER_MIN: ${RATE_LIMIT_LOGIN_PER_MIN:-5}
      LOGIN_LOCKOUT_THRESHOLD: ${LOGIN_LOCKOUT_THRESHOLD:-10}
      LOGIN_LOCKOUT_MINUTES: ${LOGIN_LOCKOUT_MINUTES:-15}
    # Per default il backend è esposto SOLO su localhost del server
    # (`127.0.0.1:8000`): tutto il traffico esterno passa via il reverse
    # proxy del frontend nginx. Per esporlo direttamente (es. webhook
    # esterni, debugging, accesso da app mobile) settare BACKEND_PORT
    # in `.env` — sintassi accetta sia `8000` (binding 0.0.0.0) sia
    # `192.168.1.10:8000` (binding interfaccia specifica).
    ports:
      - "${BACKEND_PORT:-127.0.0.1:8000}:8000"
    volumes:
      - uploads:/app/uploads
      - generated_pdfs:/app/generated_pdfs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/system/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_UPLOADS_BASE_URL: /uploads
    image: a4u-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    # Porta pubblica del frontend (nginx serve dist + proxy /api → backend).
    # Default 80; cambiare via FRONTEND_PORT in `.env` se la 80 è già
    # occupata o se il TLS è terminato altrove (Caddy/Cloudflare/ecc.).
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  uploads:
  generated_pdfs:
