services:
  postgres:
    image: postgres:16-alpine
    container_name: a4u-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-a4u}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-a4u_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-a4u}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "statement_timeout=30000"
      - "-c"
      - "log_min_duration_statement=200"
      # max_connections alzato da 100 (default) a 200 per supportare la
      # duplicazione corso con alta concorrenza: il pool del backend va
      # fino a 110 connessioni (A4U_DATABASE_POOL_SIZE=30 +
      # A4U_DATABASE_MAX_OVERFLOW=80), piu' margine per autovacuum,
      # replication, psql admin, e altri client.
      - "-c"
      - "max_connections=200"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-a4u} -d ${POSTGRES_DB:-a4u}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
