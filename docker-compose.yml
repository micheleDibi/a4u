services:
  postgres:
    image: postgres:16-alpine
    container_name: a4u-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-a4u}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-a4u_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-a4u}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "statement_timeout=30000"
      - "-c"
      - "log_min_duration_statement=200"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-a4u} -d ${POSTGRES_DB:-a4u}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
