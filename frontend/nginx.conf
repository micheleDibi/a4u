server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Limite upload: avatar (immagini) e materiali corso (PDF/DOCX/RTF/TXT).
  # Deve essere >= max(UPLOAD_MAX_MB, AVATAR_AUDIO_MAX_MB) del backend
  # — il backend di default usa 5 MB / 10 MB. Margin generoso.
  client_max_body_size 25m;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # microphone/camera abilitati per la STESSA origine: servono per la
  # registrazione del campione vocale (e futura webcam) nella creazione
  # dell'avatar personale. Chrome applica rigidamente Permissions-Policy:
  # con `microphone=()` getUserMedia veniva bloccato solo su Chrome.
  add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(self)" always;

  location /api/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_request_buffering off;
  }

  location /uploads/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri /index.html;
  }

  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml text/xml application/wasm image/svg+xml;
  gzip_min_length 256;
}
