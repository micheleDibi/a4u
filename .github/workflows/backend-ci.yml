name: backend-ci

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: a4u
          POSTGRES_PASSWORD: a4u_test_password
          POSTGRES_DB: a4u_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U a4u" --health-interval 5s
          --health-timeout 5s --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://a4u:a4u_test_password@localhost:5432/a4u_test
      JWT_SECRET: ci-test-secret-with-at-least-32-bytes-padding-here
      ENV: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Type check (mypy)
        run: mypy app
      - name: Migrate
        run: alembic upgrade head
      - name: Tests
        run: pytest -q
